# Pre-commit hooks configuration
# See https://pre-commit.com for more information

repos:
  # Python代码格式化
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3

  # 导入排序
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # 代码检查
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=100', '--ignore=E203,W503']

  # 类型检查
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, '--no-implicit-optional']

  # 通用检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict

  # 安全检查
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ['-r', 'src/', '-l', '--skip', 'B110,B108,B105,B324,B603,B403,B301,B102,B404,B405,B607,B307,B602']
        pass_filenames: false

  # 测试运行
  - repo: local
    hooks:
      - id: pytest-check
        name: Run tests
        entry: python -m pytest tests/ -xvs --tb=short
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]

  # 心语代码格式化
  - repo: local
    hooks:
      - id: xinyu-format
        name: Format Xinyu code
        entry: python tools/simple_formatter.py --check
        language: system
        types: [file]
        files: \.xinyu$
        pass_filenames: true
        args: [--check]

      - id: xinyu-format-fix
        name: Format Xinyu code (auto-fix)
        entry: python tools/simple_formatter.py --in-place
        language: system
        types: [file]
        files: \.xinyu$
        pass_filenames: true
        args: [--in-place]
        stages: [commit]
