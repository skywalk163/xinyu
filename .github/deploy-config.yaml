# 部署配置
version: 1.0

# 环境配置
environments:
  test:
    name: "测试环境"
    pypi_url: "https://test.pypi.org/legacy/"
    api_token_env: "TEST_PYPI_API_TOKEN"
    description: "用于测试发布的TestPyPI环境"

  production:
    name: "生产环境"
    pypi_url: "https://upload.pypi.org/legacy/"
    api_token_env: "PYPI_API_TOKEN"
    description: "正式发布的PyPI环境"

# 检查配置
checks:
  code_quality: true
  tests: true
  security: true
  build: true
  docs: false

# 测试配置
tests:
  unit: true
  integration: true
  functional: true
  repl: true
  formatter: true
  performance: false

  # 测试超时设置（秒）
  timeout:
    unit: 300
    integration: 600
    functional: 900
    performance: 1800

# 构建配置
build:
  # 清理构建目录
  clean: true

  # 构建目标
  targets:
    - sdist
    - wheel

  # 包含的文件
  include:
    - "src/**/*.py"
    - "README.md"
    - "LICENSE"
    - "pyproject.toml"
    - "requirements.txt"

  # 排除的文件
  exclude:
    - "**/__pycache__/**"
    - "**/*.pyc"
    - "**/.pytest_cache/**"
    - "**/.mypy_cache/**"
    - "**/.coverage"
    - "**/test_*.py"
    - "**/conftest.py"

# 发布配置
release:
  # 版本号格式
  version_pattern: "^v?\\d+\\.\\d+\\.\\d+(-[a-zA-Z0-9]+(\\.[0-9]+)?)?$"

  # 预发布标签
  prerelease_tags:
    - "alpha"
    - "beta"
    - "rc"

  # 发布说明模板
  changelog_template: |
    # 心语编程语言 {{version}}

    ## 变更日志

    {{changelog}}

    ## 安装

    ```bash
    pip install xinyu-lang=={{version}}
    ```

    ## 文档

    - [用户指南](https://github.com/yourusername/xinyu-lang/blob/main/docs/USER_GUIDE.md)
    - [API参考](https://github.com/yourusername/xinyu-lang/blob/main/docs/API_REFERENCE.md)
    - [快速开始](https://github.com/yourusername/xinyu-lang#快速开始)

    ## 下载

    从 [PyPI](https://pypi.org/project/xinyu-lang/{{version}}/) 下载

# 文档配置
docs:
  # 文档工具
  tools:
    sphinx: true
    myst_parser: true
    sphinx_rtd_theme: true

  # 构建选项
  options:
    language: "zh_CN"
    theme: "sphinx_rtd_theme"
    extensions:
      - "sphinx.ext.autodoc"
      - "sphinx.ext.viewcode"
      - "sphinx.ext.napoleon"
      - "myst_parser"
      - "sphinx_copybutton"
      - "sphinx_design"

  # 部署目标
  deploy:
    github_pages: true
    readthedocs: false

# 通知配置
notifications:
  # Slack通知
  slack:
    enabled: true
    channel: "#ci-cd"
    username: "部署机器人"
    icon_emoji: ":robot_face:"

  # 邮件通知
  email:
    enabled: false
    recipients:
      - "maintainers@xinyu-lang.org"

  # 成功通知模板
  success_template: |
    :rocket: *部署成功*: 心语编程语言 {{version}}

    环境: {{environment}}
    状态: ✅ 成功
    时间: {{timestamp}}

    下载: {{download_url}}
    Release: {{release_url}}

  # 失败通知模板
  failure_template: |
    :x: *部署失败*: 心语编程语言 {{version}}

    环境: {{environment}}
    状态: ❌ 失败
    时间: {{timestamp}}

    错误: {{error_message}}
    日志: {{log_url}}

# 监控配置
monitoring:
  # 性能监控
  performance:
    enabled: true
    metrics:
      - build_time
      - test_time
      - coverage
      - code_quality_score

  # 错误监控
  errors:
    enabled: true
    notify_on:
      - build_failure
      - test_failure
      - deployment_failure

  # 报告
  reports:
    daily: true
    weekly: true
    monthly: true

# 回滚配置
rollback:
  enabled: true
  max_versions: 5
  automatic: false

  # 回滚条件
  conditions:
    - test_failure_rate > 0.1
    - build_failure
    - deployment_failure

# 缓存配置
cache:
  # pip缓存
  pip: true
  pip_cache_dir: "~/.cache/pip"

  # 构建缓存
  build: true
  build_cache_dir: "~/.cache/xinyu-build"

  # 测试缓存
  test: true
  test_cache_dir: "~/.cache/xinyu-test"

# 安全配置
security:
  # 依赖安全检查
  dependency_check: true
  tools:
    - bandit
    - safety
    - pip-audit

  # 密钥管理
  secrets:
    pypi_token: true
    test_pypi_token: true
    slack_webhook: true

  # 访问控制
  access_control:
    production_deploy: ["maintainers"]
    test_deploy: ["developers", "maintainers"]
    manual_trigger: ["maintainers"]

# 备份配置
backup:
  enabled: true
  location: "backups/"
  retention_days: 30

  # 备份内容
  include:
    - "dist/*"
    - "docs/_build/*"
    - "coverage.xml"
    - ".coverage"

  # 备份频率
  frequency:
    on_release: true
    daily: false
    weekly: true

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # 日志文件
  file:
    enabled: true
    path: "logs/deploy.log"
    max_size: "10MB"
    backup_count: 5

  # 控制台输出
  console:
    enabled: true
    color: true

# 高级配置
advanced:
  # 并行执行
  parallel:
    tests: true
    max_workers: 4

  # 重试机制
  retry:
    enabled: true
    max_attempts: 3
    delay: 5  # 秒

  # 超时设置
  timeout:
    total: 3600  # 秒
    step: 300    # 秒

  # 资源限制
  resources:
    memory: "2GB"
    cpu: "2"

  # 环境变量
  environment:
    PYTHONPATH: "."
    PYTHONUNBUFFERED: "1"
    PIP_NO_CACHE_DIR: "false"
