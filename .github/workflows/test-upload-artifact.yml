name: Test upload-artifact v4

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  test-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Test upload-artifact v4
      uses: actions/upload-artifact@v4
      with:
        name: test-artifact
        path: README.md

    - name: Test upload-pages-artifact v2
      uses: actions/upload-pages-artifact@v2
      with:
        path: .

    - name: Verify no v3 references
      run: |
        echo "Checking for v3 references in workflow files..."
        if grep -r "upload-artifact@v3" .github/workflows/; then
          echo "ERROR: Found v3 references!"
          exit 1
        else
          echo "SUCCESS: No v3 references found"
        fi
