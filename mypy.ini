[mypy]
python_version = 3.8
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
ignore_missing_imports = True

# 排除的目录
exclude = (?x)(
    \.venv
    | venv
    | \.git
    | \.pytest_cache
    | \.mypy_cache
    | build
    | dist
  )

# 特定模块的配置
[mypy-src.lexer.*]
ignore_errors = False

[mypy-src.parser.*]
ignore_errors = False

[mypy-src.semantic.*]
ignore_errors = False

[mypy-src.codegen.*]
ignore_errors = False

[mypy-src.runtime.*]
ignore_errors = False

[mypy-src.security.*]
ignore_errors = False

# 第三方库
[mypy-ply.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True

[mypy-RestrictedPython.*]
ignore_missing_imports = True
